version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo Installing OWASP ZAP dependencies...
      - pip install python-owasp-zap-v2.4

  pre_build:
    commands:
      - echo Getting application URL from EKS service...
      - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION
      - export APP_URL=$(kubectl get service devops-demo-service -o jsonpath='{.status.loadBalancer.ingress.hostname}')
      - echo "Application URL: http://$APP_URL"

  build:
    commands:
      - echo Starting DAST scan with OWASP ZAP...
      - |
        python3 << 'EOF'
        from zapv2 import ZAPv2
        import time
        import sys
        import os

        zap_url = os.environ['ZAP_URL']
        zap_api_key = os.environ['ZAP_API_KEY']
        target_url = f"http://{os.environ['APP_URL']}"

        zap = ZAPv2(apikey=zap_api_key, proxies={'http': zap_url, 'https': zap_url})

        print(f"Starting spider scan on {target_url}")
        scan_id = zap.spider.scan(target_url)

        while int(zap.spider.status(scan_id)) < 100:
            print(f"Spider progress: {zap.spider.status(scan_id)}%")
            time.sleep(5)

        print("Spider scan completed. Starting active scan...")
        scan_id = zap.ascan.scan(target_url)

        while int(zap.ascan.status(scan_id)) < 100:
            print(f"Active scan progress: {zap.ascan.status(scan_id)}%")
            time.sleep(10)

        print("Active scan completed. Checking for vulnerabilities...")
        alerts = zap.core.alerts(baseurl=target_url)

        high_risk = [a for a in alerts if a['risk'] == 'High']
        medium_risk = [a for a in alerts if a['risk'] == 'Medium']

        print(f"High risk vulnerabilities: {len(high_risk)}")
        print(f"Medium risk vulnerabilities: {len(medium_risk)}")

        if len(high_risk) > 0:
            print("DAST scan failed due to high-risk vulnerabilities!")
            for alert in high_risk:
                print(f"  - {alert['alert']}: {alert['desc']}")
            sys.exit(1)

        print("DAST scan passed!")
        EOF

  post_build:
    commands:
      - echo DAST scan completed successfully

artifacts:
  files:
    - zap-report.html
